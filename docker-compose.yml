services:
  web:
    build:
      context: ./
    volumes:
      - .:/src
    command: supervisor -e 'js,pug,html' --exec node index.js
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: mysql:latest
    restart: always
    env_file:
      - ./.env
    command: --innodb_use_native_aio=0
    ports:
      - "3308:3306"
    volumes:
      - ./db:/var/lib/mysql
      # ADD THIS LINE: This maps your file into the auto-run folder
      - ./sd2-db.sql:/docker-entrypoint-initdb.d/init.sql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    env_file:
      - ./.env
    ports:
      - "8081:80"
    depends_on:
      - db